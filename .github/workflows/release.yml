name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Zip artifact
        shell: powershell
        run: Compress-Archive -Path build/Release/SaveAliasOld.aux2 -DestinationPath SaveAliasOld-Release.zip -Force

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: SaveAliasOld-Release.zip
